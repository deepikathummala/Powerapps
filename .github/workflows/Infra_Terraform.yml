name: Terraform
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Infra

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_SECRET }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=ikea-rg" \
            -backend-config="storage_account_name=ikeadevst01" \
            -backend-config="container_name= tfstate" \
            -backend-config="key=dev.tfstate" \
            -backend-config="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -backend-config="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -reconfigure -input=false -lock-timeout=300s

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -var-file=environments/${{ github.event.inputs.environment }}.tfvars -out=tfplan -lock-timeout=300s

      - name: Terraform apply
        if: github.event.inputs.environment == 'prod' || github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
