name: Terraform Deployment

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # - name: Azure Login
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Debug Secrets2  
        run: |
         echo "Client ID exists: ${{ secrets.AZURE_ID != '' }}"
         echo "Tenant ID exists: ${{ secrets.AZURE_TENANT_ID != '' }}"
         echo "Subscription ID exists: ${{ secrets.AZURE_SUBCRIPTION_ID != '' }}"
      - uses: azure/login@v3
        with:
         creds: '{"clientId":"${{ secrets.AZURE_ID }}","clientSecret":"${{ secrets.AZURE_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # - name: Terraform Init
      #   run: terraform init

      # - name: Terraform Validate
      #   run: terraform validate

      # - name: Terraform Plan
      #   run: terraform plan -var-file=environments/dev.tfvars

      # - name: Terraform Apply
      #   run: terraform apply -auto-approve -var-file=environments/dev.tfvars
      - name: Terraform Init
        working-directory: ./Infra
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ./Infra
        run: terraform plan -var-file=environments/dev.tfvars
      
      - name: Terraform Apply
        working-directory: ./Infra
        run: terraform apply -auto-approve -var-file=environments/dev.tfvars
